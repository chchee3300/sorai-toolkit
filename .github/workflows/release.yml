name: Release

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# get-next-version's dry-run push check and the real release job both need
# write access to create tags/releases.
permissions:
  contents: write

# playwright (a devDependency, used only by tests/*.js) triggers a
# multi-hundred-MB browser-binary download on every `npm ci` unless this is
# set -- no job here runs the test suite, and this was severe enough to hit
# "No space left on device" building the macOS package. Set globally so
# every job's `npm ci` skips it.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  get-next-version:
    runs-on: ubuntu-latest
    outputs:
      will-release: ${{ steps.version.outputs.will-release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # semantic-release >=25 requires Node >=22.14 -- unrelated to the
      # Node version the app itself builds with (see build-* jobs below).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - id: version
        run: node scripts/get-next-version.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: get-next-version
    if: needs.get-next-version.outputs.will-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Pinned: @neutralinojs/neu's "latest" (11.7.2) declares "uuid": "^14.0.0"
      # but its own code still does a CommonJS require('uuid') -- uuid 14 is
      # ESM-only, so a fresh `npm install -g` of "latest" crashes immediately
      # with ERR_REQUIRE_ESM. 11.7.1 is the last version pinning uuid to the
      # CJS-safe ^8.3.2 range. Re-check occasionally for a fixed upstream
      # release before assuming this pin is still needed.
      - run: npm install -g @neutralinojs/neu@11.7.1
      - run: neu update
      - run: node scripts/copy-neutralino-client.mjs
      - run: node scripts/write-version.mjs "${{ needs.get-next-version.outputs.version }}"
      - run: npm run build
      - name: Install unzip and fpm
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm
      - run: node setup.mjs
      - run: neu build --release --embed-resources
      - run: bash packaging/linux/build.sh "${{ needs.get-next-version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: release-assets/*
          retention-days: 1

  build-windows:
    needs: get-next-version
    if: needs.get-next-version.outputs.will-release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Pinned: @neutralinojs/neu's "latest" (11.7.2) declares "uuid": "^14.0.0"
      # but its own code still does a CommonJS require('uuid') -- uuid 14 is
      # ESM-only, so a fresh `npm install -g` of "latest" crashes immediately
      # with ERR_REQUIRE_ESM. 11.7.1 is the last version pinning uuid to the
      # CJS-safe ^8.3.2 range. Re-check occasionally for a fixed upstream
      # release before assuming this pin is still needed.
      - run: npm install -g @neutralinojs/neu@11.7.1
      - run: neu update
      - run: node scripts/copy-neutralino-client.mjs
      - run: node scripts/write-version.mjs "${{ needs.get-next-version.outputs.version }}"
      - run: npm run build
      - run: node setup.mjs
      - run: neu build --release --embed-resources
      - run: pwsh packaging/windows/install-innosetup.ps1
      - run: pwsh packaging/windows/build.ps1 -Version "${{ needs.get-next-version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: release-assets/*
          retention-days: 1

  build-macos:
    needs: get-next-version
    if: needs.get-next-version.outputs.will-release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Pinned: @neutralinojs/neu's "latest" (11.7.2) declares "uuid": "^14.0.0"
      # but its own code still does a CommonJS require('uuid') -- uuid 14 is
      # ESM-only, so a fresh `npm install -g` of "latest" crashes immediately
      # with ERR_REQUIRE_ESM. 11.7.1 is the last version pinning uuid to the
      # CJS-safe ^8.3.2 range. Re-check occasionally for a fixed upstream
      # release before assuming this pin is still needed.
      - run: npm install -g @neutralinojs/neu@11.7.1
      - run: neu update
      - run: node scripts/copy-neutralino-client.mjs
      - run: node scripts/write-version.mjs "${{ needs.get-next-version.outputs.version }}"
      - run: npm run build
      - run: node setup.mjs
      - name: Populate the other mac arch folder
        # evermeet.cx publishes one ffmpeg build advertised as covering both
        # Intel and Apple Silicon (see setup.mjs) -- setup.mjs only downloads
        # it into the runner's own arch folder, so copy it into the other
        # arch's folder too rather than downloading it twice.
        run: |
          if [ -f binaries/mac_arm64/ffmpeg ] && [ ! -f binaries/mac_x64/ffmpeg ]; then
            mkdir -p binaries/mac_x64 && cp binaries/mac_arm64/ffmpeg binaries/mac_x64/ffmpeg
          elif [ -f binaries/mac_x64/ffmpeg ] && [ ! -f binaries/mac_arm64/ffmpeg ]; then
            mkdir -p binaries/mac_arm64 && cp binaries/mac_x64/ffmpeg binaries/mac_arm64/ffmpeg
          fi
      - run: neu build --release --embed-resources
      - run: bash packaging/macos/build.sh "${{ needs.get-next-version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: release-assets/*
          retention-days: 1

  release:
    needs: [get-next-version, build-linux, build-windows, build-macos]
    if: needs.get-next-version.outputs.will-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Download all built packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '*-packages'
          merge-multiple: true
      - run: ls -la release-assets
      # Writes the real version into src/version.json in *this* checkout so
      # @semantic-release/git (see .releaserc.json) commits it back to the
      # repo as part of the "chore(release)" commit -- otherwise the
      # committed file stays at whatever placeholder it last had, and the
      # StatusBar version display / useUpdateChecker.js's baseline never
      # reflects the actual last release.
      - run: node scripts/write-version.mjs "${{ needs.get-next-version.outputs.version }}"
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
